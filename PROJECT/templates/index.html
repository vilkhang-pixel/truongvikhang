<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trường Vi Khang - Rạp Phim Tại Gia</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #141414;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            color: #e50914; 
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p.description {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .movie-container {
            width: 90%;
            max-width: 850px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid #222;
        }

        video {
            width: 100%;
            display: block;
            outline: none;
        }

        footer {
            margin-top: 40px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Frankelda Cinema</h1>
    <p class="description">Đang phát: Tôi là Frankelda</p>

    <div class="movie-container">
        <video controls poster="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1025&auto=format&fit=crop">
            <source src="{{ url_for('static', filename='toi_la_frankelda.mp4') }}" type="video/mp4">
            Trình duyệt của bạn không hỗ trợ định dạng video này.
        </video>
    </div>

    <footer>&copy; 2026 Dự án Web Xem Phim của Trường Vi Khang</footer>

</body>
</html>
